<html lang="en">

</head>
<body>
<nav>
<h2>ExpenseTracker</h2>
<ul>
<li><a href="/index.html">Home</a></li>
<li><a href="/add-transaction.html">Add Transaction</a></li>
<li><a href="/transactions.html">History</a></li>
<li><a href="#">Logout</a></li>
</ul>
</nav>

<section class="main">
    <h1> Add Transaction </h1>

    <form action="">

        <label for="Type">Transaction Type</label>
        <select name="Type" id="Type">
            <option value="">Select Type</option>
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>
        </select>

        <label for="Amount">Amount</label>
        <input type="number" placeholder="Amount" class="Amount">

        <label for="Amount">Category</label>
        <input type="text" placeholder="Salary / Food etc...    " class="Amount">

        <label for="Amount">Date</label>
        <input type="date" placeholder="Date" class="Amount">

        <label for="Amount">Description</label>
        <textarea name="Description" id="Description">
            Optional Description
        </textarea>
    </form>
    <button type="submit" class="btn">Add Transaction </button>
</section>

</html>
